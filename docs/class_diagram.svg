<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" style="background:#0b0f16; font-family:Arial, sans-serif;">
  <style>
    .box { fill:#111827; stroke:#7c3aed; stroke-width:2; }
    .title { fill:#ffffff; font-size:16px; font-weight:bold; }
    .text { fill:#cbd5e1; font-size:14px; }
    .line { stroke:#7c3aed; stroke-width:2; marker-end:url(#arrow); }
    .dashed { stroke-dasharray:8 6; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect class="box" x="420" y="20" width="360" height="110" rx="12" ry="12"/>
  <text class="title" x="600" y="45" text-anchor="middle">Simulation</text>
  <text class="text" x="450" y="70">+__init__(...)</text>
  <text class="text" x="450" y="93">+build_runtime(...)</text>
  <text class="text" x="450" y="116">+execute_world(...)</text>

  <rect class="box" x="40" y="170" width="260" height="90" rx="12" ry="12"/>
  <text class="title" x="170" y="200" text-anchor="middle">Engine</text>
  <text class="text" x="70" y="230">+update_time()</text>
  <text class="text" x="70" y="250">+is_running</text>

  <rect class="box" x="470" y="170" width="260" height="110" rx="12" ry="12"/>
  <text class="title" x="600" y="200" text-anchor="middle">World</text>
  <text class="text" x="500" y="230">+spawn_particle()</text>
  <text class="text" x="500" y="250">+update(dt)</text>
  <text class="text" x="500" y="270">+get_alive_particles()</text>

  <rect class="box" x="900" y="170" width="260" height="100" rx="12" ry="12"/>
  <text class="title" x="1030" y="200" text-anchor="middle">Renderer</text>
  <text class="text" x="940" y="235">+render(world,...)</text>

  <rect class="box" x="470" y="320" width="260" height="100" rx="12" ry="12"/>
  <text class="title" x="600" y="350" text-anchor="middle">AeroSolver</text>
  <text class="text" x="500" y="380">+step_sandbox(...)</text>
  <text class="text" x="500" y="400">+_resolve_*()</text>

  <rect class="box" x="40" y="320" width="260" height="110" rx="12" ry="12"/>
  <text class="title" x="170" y="350" text-anchor="middle">PersistenceRepository</text>
  <text class="text" x="50" y="380">+get_maps(...)</text>
  <text class="text" x="50" y="400">+generate_particle_sequence(...)</text>
  <text class="text" x="50" y="420">+get_particle_sequence(...)</text>

  <rect class="box" x="40" y="520" width="260" height="90" rx="12" ry="12"/>
  <text class="title" x="170" y="545" text-anchor="middle">MapModel</text>
  <text class="text" x="60" y="575">+id, name, x_start</text>

  <rect class="box" x="180" y="640" width="260" height="90" rx="12" ry="12"/>
  <text class="title" x="310" y="665" text-anchor="middle">PresetModel</text>
  <text class="text" x="220" y="695">+spawn_interval</text>

  <rect class="box" x="900" y="320" width="260" height="120" rx="12" ry="12"/>
  <text class="title" x="1030" y="350" text-anchor="middle">Menu</text>
  <text class="text" x="940" y="380">+show_results_screen()</text>
  <text class="text" x="940" y="400">+map_buttons</text>
  <text class="text" x="940" y="420">+batch_menu</text>

  <rect class="box" x="900" y="520" width="260" height="90" rx="12" ry="12"/>
  <text class="title" x="1030" y="545" text-anchor="middle">BatchMenu</text>
  <text class="text" x="940" y="575">+show()</text>

  <rect class="box" x="900" y="670" width="260" height="90" rx="12" ry="12"/>
  <text class="title" x="1030" y="695" text-anchor="middle">ResultsScreen</text>
  <text class="text" x="940" y="725">+show()</text>

  <rect class="box" x="470" y="520" width="260" height="90" rx="12" ry="12"/>
  <text class="title" x="600" y="545" text-anchor="middle">Particle</text>
  <text class="text" x="495" y="575">+update_position()</text>
  <text class="text" x="495" y="595">+apply_acceleration()</text>

  <rect class="box" x="470" y="670" width="260" height="90" rx="12" ry="12"/>
  <text class="title" x="600" y="695" text-anchor="middle">Obstacle</text>
  <text class="text" x="500" y="725">+contains(x,y)</text>

  <rect class="box" x="730" y="670" width="260" height="90" rx="12" ry="12"/>
  <text class="title" x="860" y="695" text-anchor="middle">Polygon</text>
  <text class="text" x="760" y="725">+contains()</text>

  <rect class="box" x="990" y="670" width="260" height="80" rx="12" ry="12"/>
  <text class="title" x="1120" y="700" text-anchor="middle">Roof</text>
  <text class="text" x="1000" y="725">+update()</text>

  <line class="line" x1="600" y1="130" x2="150" y2="170"/>
  <line class="line" x1="610" y1="130" x2="600" y2="170"/>
  <line class="line" x1="780" y1="130" x2="1000" y2="170"/>
  <line class="line" x1="600" y1="130" x2="600" y2="320"/>
  <line class="line" x1="180" y1="230" x2="180" y2="320"/>
  <line class="line" x1="330" y1="320" x2="540" y2="320" class="dashed"/>
  <line class="line" x1="540" y1="320" x2="540" y2="520" class="dashed"/>
  <line class="line" x1="540" y1="520" x2="540" y2="670" class="dashed"/>
  <line class="line" x1="600" y1="350" x2="820" y2="520" class="dashed"/>
  <line class="line" x1="600" y1="350" x2="1020" y2="520"/>
  <line class="line" x1="1030" y1="210" x2="1030" y2="320"/>
  <line class="line" x1="250" y1="430" x2="250" y2="520"/>
  <line class="line" x1="170" y1="610" x2="170" y2="520"/>
  <line class="line" x1="350" y1="670" x2="350" y2="520" class="dashed"/>
</svg>
